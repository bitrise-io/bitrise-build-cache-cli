    - script:
        title: Build 1
        inputs:
        - content: bash $BITRISE_SOURCE_DIR/scripts/ccache_e2e_build_seek_ios.sh
    - script:
        title: Build 2
        inputs:
        - content: bash $BITRISE_SOURCE_DIR/scripts/ccache_e2e_build_seek_ios.sh
    - script:
        title: Assert CLI invocation analytics were sent
        inputs:
        - content: bash $BITRISE_SOURCE_DIR/scripts/ccache_e2e_assert_ios_cache_hit.sh

  ccache-storage-helper-test:
    meta:
