    - script:
        title: Install ccache and gcc
        inputs:
        - content: bash $BITRISE_SOURCE_DIR/scripts/ccache_e2e_install.sh
    - script:
        title: Assert remote cache hit via ccache storage helper
        inputs:
        - content: bash $BITRISE_SOURCE_DIR/scripts/ccache_e2e_test.sh

step_bundles:
  # -------------------------------------------------------------------------------
  # Main bundles
  # -------------------------------------------------------------------------------
  rn-cli-benchmark-prepare:
    meta:
      bitrise.io:
        machine_type_id: g2.mac.large
        stack: osx-xcode-26.3.x
    steps:
    - activate-ssh-key@4: {}
    - git-clone@8.4.2: {}
    - git::https://github.com/bitrise-steplib/bitrise-step-simple-git-clone.git:
        inputs:
        - clone_into_dir: $WORK_DIR
        - commit: $APP_COMMIT
        - repository_url: $APP_REPO_URL
    - bundle::rn-cli-restore-snapshot-cache: {}
    - bundle::rn-cli-restore-gradle: {}
    - bundle::rn-cli-restore-xcode: {}
    - bundle::rn-cli-build-cache: {}
    - change-workdir@1:
        inputs:
        - path: $WORK_DIR
    inputs:
    - APP_REPO_URL: $APP_REPO_URL
    - APP_COMMIT: $APP_COMMIT
    - USE_BUILD_CACHE: $USE_BUILD_CACHE
    - USE_KV_CACHE: $USE_KV_CACHE
  rn-cli-benchmark-finish:
    steps:
    - bundle::rn-cli-save-xcode: {}
    - bundle::rn-cli-save-gradle: {}
    - bundle::rn-cli-save-snapshot-cache: {}
    inputs:
    - APP_REPO_URL: $APP_REPO_URL
    - APP_COMMIT: $APP_COMMIT
    - USE_BUILD_CACHE: $USE_BUILD_CACHE
    - USE_KV_CACHE: $USE_KV_CACHE
  rn-cli-seek-android:
    meta:
      bitrise.io:
        machine_type_id: g2.mac.large
        stack: osx-xcode-26.3.x
    steps:
    - script@1:
        title: Configure
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -exo pipefail
            cat > ./android/app/src/main/res/values/config.xml <<'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <!-- copy this file to config.xml and uncomment / fill in the values specific to your project -->
            <resources>
                <!-- https://developers.google.com/maps/documentation/android/ -->
                <string name="gmaps_api_key">xxx</string>
            </resources>
            EOF

            mv config.example.js config.js
    - script@1:
        title: npm ci
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -exo pipefail
            npm ci
            npm run add-example-model
    - bundle::rn-cli-measure-start: {}
    - script@1:
        title: npx react-native build-android
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -exo pipefail
            ../bitrise-build-cache-cli react-native run npx react-native build-android
    - bundle::rn-cli-measure-end: {}
    - script@1.2.1:
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -exo pipefail

            ccache -s
        run_if: '{{getenv "USE_BUILD_CACHE" | eq "true"}}'
        title: ccache stats
    inputs:
    - BENCHMARK_APP_NAME: $BENCHMARK_APP_NAME
    - CCACHE_PATH: $CCACHE_PATH
  rn-cli-seek-ios:
    tools:
      ruby: 3.4.5
    meta:
      bitrise.io:
        machine_type_id: g2.mac.large
        stack: osx-xcode-26.3.x
    steps:
    - script@1:
        title: Configure
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -exo pipefail
            cat > ./android/app/src/main/res/values/config.xml <<'EOF'
            <?xml version="1.0" encoding="utf-8"?>
