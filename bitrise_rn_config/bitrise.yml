  # Main Seek workflows
  # -------------------------------------------------------------------------------
  rn-cli-seek-android-preheat:
    meta:
      bitrise.io:
        machine_type_id: g2.mac.large
        stack: osx-xcode-26.3.x
    envs:
    - APP_REPO_URL: $SEEK_URL
    - APP_COMMIT: $SEEK_COMMIT
    - USE_BUILD_CACHE: true
    - USE_KV_CACHE: true
    - WORK_DIR: $BITRISE_SOURCE_DIR/_tmp
    steps:
    - bundle::rn-cli-benchmark-prepare: {}
    - bundle::rn-cli-seek-android: {}
    - bundle::rn-cli-benchmark-finish: {}
  rn-cli-seek-android:
    meta:
      bitrise.io:
        machine_type_id: g2.mac.large
        stack: osx-xcode-26.3.x
    envs:
    - APP_REPO_URL: $SEEK_URL
    - APP_COMMIT: $SEEK_COMMIT
    - USE_BUILD_CACHE: false
    - USE_KV_CACHE: false
    - WORK_DIR: $BITRISE_SOURCE_DIR/_tmp
    - BENCHMARK_APP_NAME: Seek
    steps:
    - bundle::rn-cli-benchmark-prepare: {}
    - bundle::rn-cli-seek-android: {}
    - share-pipeline-variable@1:
        inputs:
        - variables: |-
            Seek_START=$Seek_START
            Seek_END=$Seek_END
    - deploy-to-bitrise-io@2:
        inputs:
        - deploy_path: ccache-helper-service.log
