format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: other

# Everything is prefixed with `rn-cli` to avoid an clashes with the main yml
app:
  envs:
  - SEEK_URL: git@github.com:inaturalist/SeekReactNative.git
  - SEEK_COMMIT: 036d8a6c3eb6ea15482e5afe6b7212028088cd21
  - SEEK_TAG: v2.17.9-412
  - NOTESNOOK_URL: git@github.com:streetwriters/notesnook.git
  - NOTESNOOK_COMMIT: 2b4ec5b03bf2f48a74c0eb45dcaa3f208025c919

workflows:
