            set -exo pipefail

            timestamp="$(date +%s)"
            envman add --key "${BENCHMARK_APP_NAME}_START" --value "$timestamp"
            if [[ -n "${BITRISEIO_PIPELINE_SHARED_VARIABLE_STORE_PATH-}" ]]; then
              envman add --path "$BITRISEIO_PIPELINE_SHARED_VARIABLE_STORE_PATH" --key "${BENCHMARK_APP_NAME}_START" --value "$timestamp"
            fi
        title: Store action start time
        run_if: '{{getenv "BENCHMARK_APP_NAME" | ne ""}}'
    inputs:
    - BENCHMARK_APP_NAME: $BENCHMARK_APP_NAME
