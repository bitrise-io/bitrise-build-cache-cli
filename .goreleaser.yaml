# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 1

project_name: bitrise-build-cache

# Based on https://goreleaser.com/customization/release/#github
release:
  github:
    owner: bitrise-io
    name: bitrise-build-cache-cli
  make_latest: true
  draft: false
  mode: append
  replace_existing_artifacts: true
  footer: |
    ### Gradle verification
    For reference, the verification metadata is available as an attached assset.
  extra_files:
    - glob: ./cmd/gradle/asset/verification-metadata.xml
    - glob: ./cmd/gradle/asset/verification-metadata-mirror.xml


before:
  hooks:
    - go mod tidy

builds:
  - binary: bitrise-build-cache
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/bitrise-io/bitrise-build-cache-cli/v2/internal/config/common.injectedVersion={{.Version}}
    goos:
      - linux
      # - windows
      - darwin

archives:
  - name_template: 'bitrise-build-cache_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

brews:
  - name: bitrise-build-cache
    homepage: https://bitrise.io
    description: Bitrise Build Cache CLI — configure remote build cache for Gradle, Bazel, Xcode, and React Native.
    license: MIT
    tap:
      owner: bitrise-io
      name: homebrew-bitrise-build-cache
      branch: main
    commit_author:
      name: bitbot
      email: letsbuild@bitrise.io
    commit_msg_template: 'brew formula update for {{ .ProjectName }} version {{ .Tag }}'
    folder: Formula
    test: |
      system "#{bin}/bitrise-build-cache", "--help"
    install: |
      bin.install "bitrise-build-cache"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
