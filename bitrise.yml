  e2e-xcode-comp-cache:
    meta:
      bitrise.io:
        stack: osx-xcode-26.0.x-edge
        machine_type_id: g2.mac.large
    envs:
    - TEST_APP_URL: git@github.com:bitrise-io/swift-composable-architecture.git
    - COMMIT: 27db3dfc9f55c206e09ca2a51b93bd600a56429e
    steps:
    - bundle::feature-e2e-setup: {}
    - script:
        title: activate xcode using CLI
        inputs:
          - content: |-
              #!/usr/bin/env bash
              set -eo pipefail

              echo "Original Xcodebuild command location:"
              type xcodebuild || true

              # Add --xcode-path /usr/bin/xcodebuild to test xcode path override (for local)
              ../bitrise-build-cache-cli -d activate xcode \
                --cache
    - script:
        title: build app
        inputs:
          - content: |-
              echo "Xcodebuild command location after activation:"
              type xcodebuild || true

              echo "Config file content:"
              cat "$HOME/.bitrise-xcelerate/config.json"

              echo "Starting build..."
              xcodebuild build \
                -workspace ComposableArchitecture.xcworkspace \
                -scheme ComposableArchitecture \
                -destination "generic/platform=iOS" \
                -skipMacroValidation 2> wrapper.log | tee xcodebuild.log | xcpretty

    - script:
        title: gather info
        inputs:
          - content: |-
              set -exo pipefail

              cp ~/.bitrise-xcelerate/config.json $BITRISE_DEPLOY_DIR
              cp ~/.local/state/xcelerate/logs/* $BITRISE_DEPLOY_DIR 2>/dev/null || true
              cp xcodebuild.log $BITRISE_DEPLOY_DIR
              cp wrapper.log $BITRISE_DEPLOY_DIR

              cat "$BITRISE_DEPLOY_DIR/wrapper.log"
              head -n 20 $BITRISE_DEPLOY_DIR/xcodebuild.log
              tail -n 20 $BITRISE_DEPLOY_DIR/xcodebuild.log

              source ../_e2e/scripts/error.sh
              source ../_e2e/scripts/extract_invocation_id.sh

              invocation_id=$(extract_invocation_id_xcode "$BITRISE_DEPLOY_DIR/wrapper.log")
              if [[ -z "$invocation_id" ]]; then
                fatal "Invocation ID not found in logs"
              fi

              echo "Found Invocation ID: $invocation_id"
              envman add --key INVOCATION_ID --value "$invocation_id"
    - script:
        title: Assert invocation from API
        inputs:
           - content: |-
               source ../_e2e/scripts/assert_invocations.sh
               source ../scripts/assert_xcode_invocation_fields.sh

               assert_bitrise_invocation_in_list "$INVOCATION_ID" "xcode"
               assert_bitrise_invocation_detail "$INVOCATION_ID" "xcode"
               assert_build_performance "$BITRISE_APP_SLUG"
               assert_invocation_in_build_performance "$BITRISE_APP_SLUG" "$INVOCATION_ID" "xcode"

               # ACI-5045 / ACI-5207: assert xcactivitylog enrichment re-PUT populated
               # scheme + fullCommand + xcodeVersion + toolBuildNumber on the BE payload.
               # Non-empty scheme also acts as a proxy for "enrichment landed" — slim emit never sets it.
               assert_xcode_invocation_enriched "$INVOCATION_ID"
    - script:
        title: Assert invocations list subcommand emits the fresh record
        inputs:
        - content: |-
            set -exo pipefail

            record=$(../bitrise-build-cache-cli invocations list --json --limit 5 \
              | jq --arg id "$INVOCATION_ID" '.[] | select(.invocation_id == $id)')

            if [[ -z "$record" ]]; then
              echo "invocation $INVOCATION_ID not in local NDJSON log"
              ../bitrise-build-cache-cli invocations list --json --limit 5
              exit 1
            fi

            started=$(jq -r '.started_at' <<<"$record")
            [[ "$started" != "0001-01-01T00:00:00Z" && -n "$started" ]] || { echo "started_at is zero: $started"; echo "$record"; exit 1; }

            finished=$(jq '.finished_at' <<<"$record")
            [[ "$finished" != "null" ]] || { echo "finished_at missing from record"; echo "$record"; exit 1; }

            cli=$(jq -r '.cli_version' <<<"$record")
            [[ -n "$cli" ]] || { echo "cli_version empty"; echo "$record"; exit 1; }

            tool=$(jq -r '.tool' <<<"$record")
            [[ "$tool" == "xcode" ]] || { echo "tool != xcode: $tool"; echo "$record"; exit 1; }

            echo "Local NDJSON record looks healthy:"
            echo "$record"
    - script:
        title: Check for cache usage
        inputs:
        - content: |-
            set -exo pipefail

            ../scripts/check_pattern.sh "$BITRISE_DEPLOY_DIR/xcodebuild.log" 'CompilationCacheMetrics'
    - deploy-to-bitrise-io: {}

  e2e-xcode-cas-key-stable:
    description: |
      ACI-5045: proves the compilation cache lookup key is stable across
      checkouts at different absolute paths. Two clones of the same repo
      at the same commit are built back-to-back with the same activation;
      the second build must reuse the first's uploads. If the CAS key were
      still path-sensitive (pre-prefix-map), the second build would miss
      everything and hitRate would be ~0.
    meta:
      bitrise.io:
        stack: osx-xcode-26.0.x-edge
        machine_type_id: g2.mac.large
    envs:
    - TEST_APP_URL: git@github.com:bitrise-io/swift-composable-architecture.git
    - COMMIT: 27db3dfc9f55c206e09ca2a51b93bd600a56429e
    - CHECKOUT_B_DIR: $HOME/checkoutB
    steps:
    - bundle::feature-e2e-setup: {}
    - script:
        title: Clone the sample repo into a second absolute path
        inputs:
        - content: |-
            set -exo pipefail

            # feature-e2e-setup already cloned checkout A into ./_tmp and cd'd there.
            # Clone the same commit into a completely different absolute path.
            rm -rf "$CHECKOUT_B_DIR"
            git clone "$TEST_APP_URL" "$CHECKOUT_B_DIR"
            git -C "$CHECKOUT_B_DIR" checkout "$COMMIT"

            # Sanity: paths must differ; commits must match.
            [[ "$PWD" != "$CHECKOUT_B_DIR" ]] || { echo "FAIL: checkout paths must differ"; exit 1; }
            a_sha=$(git rev-parse HEAD)
            b_sha=$(git -C "$CHECKOUT_B_DIR" rev-parse HEAD)
            [[ "$a_sha" == "$b_sha" ]] || { echo "FAIL: checkout SHAs differ: A=$a_sha B=$b_sha"; exit 1; }
            echo "OK: two checkouts at $a_sha (A=$PWD, B=$CHECKOUT_B_DIR)"
    - script:
        title: activate xcode using CLI
        inputs:
        - content: |-
            set -eo pipefail

            ../bitrise-build-cache-cli -d activate xcode --cache
    - script:
        title: Build checkout A (warm-up — expected mostly misses)
        inputs:
        - content: |-
            set -exo pipefail

            xcodebuild build \
              -workspace ComposableArchitecture.xcworkspace \
              -scheme ComposableArchitecture \
              -destination "generic/platform=iOS" \
              -skipMacroValidation 2> wrapper-A.log | tee xcodebuild-A.log | xcpretty

            cp xcodebuild-A.log "$BITRISE_DEPLOY_DIR"/
            cp wrapper-A.log "$BITRISE_DEPLOY_DIR"/
    - script:
        title: Build checkout B and assert CAS-key stability (retries once on cold-cache miss)
        retry_times: 1
        inputs:
        - content: |-
            set -exo pipefail

            source ../_e2e/scripts/error.sh
            source ../_e2e/scripts/extract_invocation_id.sh
            source ../scripts/assert_xcode_invocation_fields.sh

            cd "$CHECKOUT_B_DIR"

            rm -rf "$HOME/.bitrise/cache/xcode-dd" "$HOME/.bitrise/cache/xcode-ptd"

            xcodebuild build \
              -workspace ComposableArchitecture.xcworkspace \
              -scheme ComposableArchitecture \
              -destination "generic/platform=iOS" \
              -skipMacroValidation 2> wrapper-B.log | tee xcodebuild-B.log | xcpretty

            cp xcodebuild-B.log "$BITRISE_DEPLOY_DIR"/
            cp wrapper-B.log "$BITRISE_DEPLOY_DIR"/

            "$(dirname "$BITRISE_SOURCE_DIR")/scripts/check_pattern.sh" "$BITRISE_DEPLOY_DIR/xcodebuild-B.log" 'CompilationCacheMetrics'

            invocation_id_b=$(extract_invocation_id_xcode "$BITRISE_DEPLOY_DIR/wrapper-B.log")
            if [[ -z "$invocation_id_b" ]]; then
              fatal "checkout B invocation ID not found in wrapper-B.log"
            fi
            echo "Checkout B invocation ID: $invocation_id_b"

            assert_xcode_invocation_hit_rate_at_least "$invocation_id_b" 80
    - deploy-to-bitrise-io: {}

  e2e-xcode-wrapper-watcher-race:
    description: |
      Proves the slim-emit vs xcactivitylog-watcher timing race is
      handled by the retry bucket in the enrichment watcher: the watcher must not
      mint an orphan invocation when it sees the manifest before the wrapper's slim
      record lands. We force slim-emit slow (30s inactivity window) so the watcher's 5s
      poll definitely observes the manifest first; the retry bucket must
      then defer, wait for the slim record, and enrich the wrapper's own
      InvocationID — not a fresh UUID.
    meta:
      bitrise.io:
        stack: osx-xcode-26.0.x-edge
        machine_type_id: g2.mac.large
    envs:
    - TEST_APP_URL: git@github.com:bitrise-io/swift-composable-architecture.git
    - COMMIT: 27db3dfc9f55c206e09ca2a51b93bd600a56429e
    # Force slim emit to fire well after the watcher's manifest sighting; exercises
    # the correlation retry bucket that this workflow is designed to prove.
    - TEST_BITRISE_XCELERATE_INACTIVITY_TIMEOUT: 30s
    # Newly-renamed workflow slug; BE benchmark-phase treats it as new -> baseline.
    # Env-var override keeps cache on so the hit-rate assertion is meaningful.
    - BITRISE_BUILD_CACHE_BENCHMARK_PHASE_XCODE: established
    steps:
    - bundle::feature-e2e-setup: {}
    - script:
        title: activate xcode using CLI
        inputs:
          - content: |-
              #!/usr/bin/env bash
              set -eo pipefail

              ../bitrise-build-cache-cli -d activate xcode --cache
    - script:
        title: build app
        inputs:
          - content: |-
              set -eo pipefail

              xcodebuild build \
                -workspace ComposableArchitecture.xcworkspace \
                -scheme ComposableArchitecture \
                -destination "generic/platform=iOS" \
                -skipMacroValidation 2> wrapper.log | tee xcodebuild.log | xcpretty
    - script:
        title: gather info + extract invocation id
        inputs:
          - content: |-
              set -exo pipefail

              cp ~/.bitrise-xcelerate/config.json $BITRISE_DEPLOY_DIR
              cp ~/.local/state/xcelerate/logs/* $BITRISE_DEPLOY_DIR 2>/dev/null || true
              cp xcodebuild.log $BITRISE_DEPLOY_DIR
              cp wrapper.log $BITRISE_DEPLOY_DIR

              source ../_e2e/scripts/error.sh
              source ../_e2e/scripts/extract_invocation_id.sh

              invocation_id=$(extract_invocation_id_xcode "$BITRISE_DEPLOY_DIR/wrapper.log")
              if [[ -z "$invocation_id" ]]; then
                fatal "Invocation ID not found in logs"
              fi

              echo "Found Invocation ID: $invocation_id"
              envman add --key INVOCATION_ID --value "$invocation_id"
    - script:
        title: Wait for slim emit + enrichment race window
        inputs:
        - content: |-
            set -eo pipefail
            # Slim-emit idle window is 30s + slack for the PUT; watcher polls every 5s and
            # retries up to DefaultMaxCorrelationRetries. 60s gives both a comfortable
            # completion window while still catching regressions in either direction.
            echo "Sleeping 60s to let slim-emit and enrichment watcher converge…"
            sleep 60
    - script:
        title: Assert wrapper invocation was enriched (no orphan)
        inputs:
        - content: |-
            set -exo pipefail

            source ../_e2e/scripts/assert_invocations.sh
            source ../scripts/assert_xcode_invocation_fields.sh

            assert_bitrise_invocation_in_list "$INVOCATION_ID" "xcode"

            # Enriched fields present on OUR id proves the watcher correlated
            # against the slim record instead of minting an orphan under a new UUID.
            assert_xcode_invocation_enriched "$INVOCATION_ID"

            # Belt-and-braces: list all xcode invocations for this build; must be
            # exactly one, and it must be the wrapper's InvocationID. Two would
            # mean the watcher gave up and minted an orphan.
            assert_xcode_no_orphan_invocations_for_build "$BITRISE_BUILD_SLUG" "$INVOCATION_ID"
    - deploy-to-bitrise-io: {}

  e2e-daemon-install-macos:
    description: |
      Validate `daemon install` / `up` / `down` / `restart` / `uninstall`
      register the helper services as LaunchAgents and control them via
      launchctl. Also verifies `daemon info` prints the proxy socket path
      and that an unwrapped xcodebuild against that socket produces cache
      metrics.
    meta:
      bitrise.io:
        stack: osx-xcode-26.0.x-edge
        machine_type_id: g2.mac.large
    envs:
    - TEST_APP_URL: git@github.com:bitrise-io/swift-composable-architecture.git
    - COMMIT: 27db3dfc9f55c206e09ca2a51b93bd600a56429e
    steps:
    - bundle::feature-e2e-setup: {}
    - script:
        title: daemon install + register asserts
        inputs:
        - content: |-
            set -exo pipefail

            # Best-effort cleanup if assertions abort mid-flight, so we never
            # leak LaunchAgents on shared mac VMs.
            cleanup_on_error() {
              if [[ $? -ne 0 ]]; then
                echo "[cleanup] aborting; force-uninstalling daemon"
                ../bitrise-build-cache-cli daemon uninstall || true
              fi
            }
            trap cleanup_on_error EXIT

            uid="$(id -u)"
            envman add --key DAEMON_UID --value "$uid"

            # ----- activate xcode so the proxy has a socket path to bind on -----
            ../bitrise-build-cache-cli activate xcode --cache

            # ----- install + LaunchAgent presence asserts -----
            ../bitrise-build-cache-cli daemon install
            for label in io.bitrise.build-cache.xcelerate-proxy io.bitrise.build-cache.ccache-helper; do
              plist="$HOME/Library/LaunchAgents/${label}.plist"
              [[ -f "$plist" ]] || { echo "FAIL: plist missing: $plist"; exit 1; }
              /bin/launchctl print "gui/${uid}/${label}" >/dev/null \
                || { echo "FAIL: launchctl did not register ${label}"; exit 1; }
              echo "OK: ${label} registered"
            done

            # ----- idempotency on install -----
            ../bitrise-build-cache-cli daemon install
            echo "OK: install is idempotent"

            # ----- daemon info smoke test + socket capture (human + JSON, must agree) -----
            info_out="$(../bitrise-build-cache-cli daemon info)"
            echo "$info_out"
            proxy_socket="$(echo "$info_out" | awk -F': *' '/^xcelerate-proxy:/ {print $2; exit}')"
            [[ -n "$proxy_socket" ]] || { echo "FAIL: daemon info did not print xcelerate-proxy socket"; exit 1; }
            [[ "$proxy_socket" != "<not configured"* ]] || { echo "FAIL: socket reported as not configured"; exit 1; }
            echo "$info_out" | grep -q '^xcelerate-proxy status:' || { echo "FAIL: daemon info missing 'xcelerate-proxy status:' line"; exit 1; }
            echo "$info_out" | grep -q '^ccache-helper status:'   || { echo "FAIL: daemon info missing 'ccache-helper status:' line"; exit 1; }

            info_json="$(../bitrise-build-cache-cli daemon info --json)"
            echo "$info_json"
            proxy_socket_json="$(echo "$info_json" | jq -er '.xcelerateProxy')"
            [[ "$proxy_socket" == "$proxy_socket_json" ]] || { echo "FAIL: daemon info JSON ($proxy_socket_json) disagrees with text ($proxy_socket)"; exit 1; }
            echo "$info_json" | jq -er '.ccacheHelper'         >/dev/null || { echo "FAIL: daemon info --json missing ccacheHelper field"; exit 1; }
            echo "$info_json" | jq -er '.xcelerateProxyStatus' >/dev/null || { echo "FAIL: daemon info --json missing xcelerateProxyStatus field"; exit 1; }
            echo "$info_json" | jq -er '.ccacheHelperStatus'   >/dev/null || { echo "FAIL: daemon info --json missing ccacheHelperStatus field"; exit 1; }

            envman add --key PROXY_SOCKET --value "$proxy_socket"

            # ----- wait for the supervised proxy to bind the socket (up to 30s) -----
            for i in $(seq 1 30); do
              if [[ -S "$proxy_socket" ]]; then
                echo "OK: proxy socket live at $proxy_socket after ${i}s"
                break
              fi
              sleep 1
            done
            [[ -S "$proxy_socket" ]] || { echo "FAIL: proxy socket never appeared at $proxy_socket"; exit 1; }
    - script:
        title: build app via unwrapped xcodebuild against daemon socket
        inputs:
        - content: |-
            set -exo pipefail

            # Resolve the system xcodebuild (NOT the activate-installed wrapper)
            # so we exercise the daemon-managed long-running proxy directly via
            # COMPILATION_CACHE_REMOTE_SERVICE_PATH.
            xcb="/usr/bin/xcodebuild"
            [[ -x "$xcb" ]] || xcb="$(/usr/bin/xcrun --find xcodebuild)"

            echo "Using xcodebuild: $xcb"
            echo "Proxy socket: $PROXY_SOCKET"

            "$xcb" build \
              -workspace ComposableArchitecture.xcworkspace \
              -scheme ComposableArchitecture \
              -destination "generic/platform=iOS" \
              -skipMacroValidation \
              COMPILATION_CACHE_ENABLE_COMPILER=YES \
              COMPILATION_CACHE_REMOTE_SERVICE_PATH="$PROXY_SOCKET" \
              2> wrapper.log | tee xcodebuild.log | xcpretty

            cp xcodebuild.log wrapper.log "$BITRISE_DEPLOY_DIR/"
    - script:
        title: assert cache metrics emitted
        inputs:
        - content: |-
            set -exo pipefail
            # Benchmark "baseline" phase disables cache → no CompilationCacheMetrics
            # is emitted by xcodebuild. Skip the assert in that case so the e2e
            # workflow tracks the daemon-install flow, not BE phase rotation.
            if [[ "$BITRISE_BUILD_CACHE_BENCHMARK_PHASE_XCODE" == "baseline" ]]; then
              echo "OK: baseline benchmark phase — skipping CompilationCacheMetrics assert"
              exit 0
            fi
            ../scripts/check_pattern.sh "$BITRISE_DEPLOY_DIR/xcodebuild.log" 'CompilationCacheMetrics'
    - script:
        title: daemon down / up / restart asserts
        inputs:
        - content: |-
            set -exo pipefail
            uid="$DAEMON_UID"

            # ----- down: services stop, plist files stay -----
            ../bitrise-build-cache-cli daemon down
            for label in io.bitrise.build-cache.xcelerate-proxy io.bitrise.build-cache.ccache-helper; do
              plist="$HOME/Library/LaunchAgents/${label}.plist"
              [[ -f "$plist" ]] || { echo "FAIL: plist removed by down: $plist"; exit 1; }
              ! /bin/launchctl print "gui/${uid}/${label}" >/dev/null 2>&1 \
                || { echo "FAIL: ${label} still registered after down"; exit 1; }
              echo "OK: ${label} stopped (plist retained)"
            done

            # ----- proxy socket must be gone after down -----
            if [[ -S "$PROXY_SOCKET" ]]; then
              echo "FAIL: proxy socket still listening after daemon down: $PROXY_SOCKET"
              exit 1
            fi
            echo "OK: proxy socket gone after down"

            # ----- xcodebuild against the gone socket must NOT emit cache metrics -----
            xcb="/usr/bin/xcodebuild"
            [[ -x "$xcb" ]] || xcb="$(/usr/bin/xcrun --find xcodebuild)"
            "$xcb" build \
              -workspace ComposableArchitecture.xcworkspace \
              -scheme ComposableArchitecture \
              -destination "generic/platform=iOS" \
              -skipMacroValidation \
              COMPILATION_CACHE_ENABLE_COMPILER=YES \
              COMPILATION_CACHE_REMOTE_SERVICE_PATH="$PROXY_SOCKET" \
              2> xcodebuild-postdown.err.log | tee xcodebuild-postdown.log | xcpretty || true
            cp xcodebuild-postdown.log xcodebuild-postdown.err.log "$BITRISE_DEPLOY_DIR/"
            if grep -q 'CompilationCacheMetrics' xcodebuild-postdown.log; then
              echo "FAIL: cache metrics found in post-down xcodebuild — proxy should be unreachable"
              exit 1
            fi
            echo "OK: no cache metrics after down"

            # ----- idempotency on down (already stopped) -----
            ../bitrise-build-cache-cli daemon down
            echo "OK: down is idempotent"

            # ----- up: bring services back from existing plist files -----
            ../bitrise-build-cache-cli daemon up
            for label in io.bitrise.build-cache.xcelerate-proxy io.bitrise.build-cache.ccache-helper; do
              /bin/launchctl print "gui/${uid}/${label}" >/dev/null \
                || { echo "FAIL: ${label} not running after up"; exit 1; }
              echo "OK: ${label} started by up"
            done

            # ----- restart: stop + start in one shot -----
            ../bitrise-build-cache-cli daemon restart
            for label in io.bitrise.build-cache.xcelerate-proxy io.bitrise.build-cache.ccache-helper; do
              /bin/launchctl print "gui/${uid}/${label}" >/dev/null \
                || { echo "FAIL: ${label} not running after restart"; exit 1; }
              echo "OK: ${label} running after restart"
            done

            # ----- up without prior install errors with ErrNotInstalled -----
            ../bitrise-build-cache-cli daemon uninstall >/dev/null
            if ../bitrise-build-cache-cli daemon up 2>up_err.log; then
              echo "FAIL: up should error when daemon is not installed"
              cat up_err.log
              exit 1
            fi
            grep -q "not installed" up_err.log \
              || { echo "FAIL: expected 'not installed' hint in error output"; cat up_err.log; exit 1; }
            echo "OK: up errors with hint when daemon is not installed"

            # Reinstall so the uninstall step below has something to remove.
            ../bitrise-build-cache-cli daemon install
    - script:
        title: daemon uninstall + cleanup asserts
        inputs:
        - content: |-
            set -exo pipefail

            # ----- uninstall + asserts -----
            ../bitrise-build-cache-cli daemon uninstall
            for label in io.bitrise.build-cache.xcelerate-proxy io.bitrise.build-cache.ccache-helper; do
              plist="$HOME/Library/LaunchAgents/${label}.plist"
              [[ ! -f "$plist" ]] || { echo "FAIL: plist still present: $plist"; exit 1; }
              ! /bin/launchctl print "gui/${DAEMON_UID}/${label}" >/dev/null 2>&1 \
                || { echo "FAIL: ${label} still registered"; exit 1; }
              echo "OK: ${label} unregistered + plist removed"
            done

            # ----- idempotency on uninstall -----
            ../bitrise-build-cache-cli daemon uninstall
            echo "OK: uninstall is idempotent"
    - deploy-to-bitrise-io: {}

  e2e-mavencentral-mirror-duckduck:
    envs:
    - TEST_APP_URL: git@github.com:duckduckgo/Android.git
    - BRANCH: develop
    # both init scripts must land here, not $HOME/.gradle
    - GRADLE_USER_HOME: $HOME/custom-gradle-home
    steps:
    - bundle::feature-e2e-setup: {}
    - script@1:
        title: Change apt sources to enzu mirror
        inputs:
          - content: |-
              #!/usr/bin/env bash

              sed -i.bak 's|http://archive.ubuntu.com/ubuntu/|https://mirror.enzu.com/ubuntu/|g' /etc/apt/sources.list
    - apt-get-install:
        inputs:
          - packages: 'bc'
          - upgrade: "no"
    - set-java-version@1:
        inputs:
          - set_java_version: '21'
    - script:
        title: Enable build cache and MavenCentral mirror
        inputs:
        - content: |-
            set -exo pipefail
            ../bitrise-build-cache-cli activate gradle -d --cache --cache-push
            export BITRISE_MAVENCENTRAL_PROXY_ENABLED=true
            ../bitrise-build-cache-cli activate gradle-mirrors -d
    - script:
        title: Assert init scripts honor GRADLE_USER_HOME
        inputs:
          - content: |-
              set -exo pipefail
              test -f "$GRADLE_USER_HOME/init.d/bitrise-build-cache.init.gradle.kts"
              test -f "$GRADLE_USER_HOME/init.d/bitrise-gradle-mirrors.init.gradle.kts"
              # activate migrates the preboot mirror out of ~/.gradle, and everything else lands in GRADLE_USER_HOME
              if [ -f "$HOME/.gradle/init.d/bitrise-build-cache.init.gradle.kts" ] || [ -f "$HOME/.gradle/init.d/bitrise-gradle-mirrors.init.gradle.kts" ]; then
                echo "ERROR: init scripts written to ~/.gradle instead of GRADLE_USER_HOME ($GRADLE_USER_HOME)"
                exit 1
              fi
              echo "=== bitrise-build-cache.init.gradle.kts ==="
              cat "$GRADLE_USER_HOME/init.d/bitrise-build-cache.init.gradle.kts"
              echo ""
              echo "=== bitrise-gradle-mirrors.init.gradle.kts ==="
              cat "$GRADLE_USER_HOME/init.d/bitrise-gradle-mirrors.init.gradle.kts"
    - script:
        title: Guard - init script compiles clean under allWarningsAsErrors
        inputs:
        - content: |-
            set -exo pipefail
            # Some customers' Gradle promotes Kotlin DSL warnings to errors via
            # org.gradle.kotlin.dsl.allWarningsAsErrors; under that setting an init-script
            # warning fails compilation and thus every gradle build (the v2.8.10 regression).
            # Compile our init script in an isolated GRADLE_USER_HOME + empty project so the
            # property applies only to our script, not DuckDuckGo's build scripts.
            GUARD_HOME=$(mktemp -d)
            GUARD_PROJ=$(mktemp -d)
            mkdir -p "$GUARD_HOME/init.d"
            cp "$GRADLE_USER_HOME/init.d/bitrise-gradle-mirrors.init.gradle.kts" "$GUARD_HOME/init.d/"
            printf 'org.gradle.kotlin.dsl.allWarningsAsErrors=true\n' > "$GUARD_HOME/gradle.properties"
            printf 'rootProject.name = "init-compile-guard"\n' > "$GUARD_PROJ/settings.gradle.kts"
            GRADLE_USER_HOME="$GUARD_HOME" ./gradlew --project-dir "$GUARD_PROJ" help --stacktrace
            echo "SUCCESS: init script compiles clean under allWarningsAsErrors"
    - script:
        title: Build and capture logs
        inputs:
        - content: |-
            set -exo pipefail
            ./gradlew debug --info --stacktrace > "$BITRISE_DEPLOY_DIR/logs.txt" 2>&1
            # Robolectric unit test to exercise the android-all jar audit + native-runtime probes (tolerate failure; append logs).
            # --rerun forces just this task to re-execute (bypasses both up-to-date and the build cache for the test task only,
            # so its compile deps still load FROM-CACHE): served FROM-CACHE the test never forks a JVM, so Robolectric never
            # boots and DisplayMetrics / android-all / the native runtime never load (the probe + ICU audit stay dark).
            ./gradlew :ad-click-impl:testDebugUnitTest --rerun --info --stacktrace >> "$BITRISE_DEPLOY_DIR/logs.txt" 2>&1 || true
    - script:
        title: Assert downloads from MavenCentral mirror
        inputs:
        - content: |-
            set -exo pipefail

            MIRROR_URL="repository-manager(-[a-z]+)?\.services\.bitrise\.io:8090/maven/central"
            MATCH_COUNT=$(grep -cE "$MIRROR_URL" "$BITRISE_DEPLOY_DIR/logs.txt" || true)

            echo "Found $MATCH_COUNT log lines referencing the MavenCentral mirror"

            if [[ "$MATCH_COUNT" -eq 0 ]]; then
              echo "ERROR: No downloads from the MavenCentral mirror were found in the build logs."
              echo "Expected to find references to $MIRROR_URL"
              exit 1
            fi

            echo "SUCCESS: Verified $MATCH_COUNT downloads from the MavenCentral mirror."
    - script:
        title: Assert downloads from Google mirror
        inputs:
        - content: |-
            set -exo pipefail

            MIRROR_URL="repository-manager(-[a-z]+)?\.services\.bitrise\.io:8090/maven/google"
            MATCH_COUNT=$(grep -cE "$MIRROR_URL" "$BITRISE_DEPLOY_DIR/logs.txt" || true)

            echo "Found $MATCH_COUNT log lines referencing the Google mirror"

            if [[ "$MATCH_COUNT" -eq 0 ]]; then
              echo "ERROR: No downloads from the Google mirror were found in the build logs."
              echo "Expected to find references to $MIRROR_URL"
              exit 1
            fi

            echo "SUCCESS: Verified $MATCH_COUNT downloads from the Google mirror."
    - script:
        title: Assert robolectric probe emitted
        inputs:
        - content: |-
            set -exo pipefail

            MATCH_COUNT=$(grep -cE '\[robolectric-probe\]' "$BITRISE_DEPLOY_DIR/logs.txt" || true)
            echo "Found $MATCH_COUNT robolectric probe log lines:"
            grep -E '\[robolectric-probe\]' "$BITRISE_DEPLOY_DIR/logs.txt" || true

            if [[ "$MATCH_COUNT" -eq 0 ]]; then
              echo "ERROR: no [robolectric-probe] line found — the probe did not emit."
              exit 1
            fi

            echo "SUCCESS: robolectric probe emitted $MATCH_COUNT line(s)."
    - script:
        title: Check for cache invocations
        inputs:
        - content: |-
            set -exo pipefail

            ../scripts/check_pattern.sh "$BITRISE_DEPLOY_DIR/logs.txt" \
              '\[Bitrise Build Cache\].*🤖 Bitrise remote cache enabled' \
              '\[Bitrise Build Cache\].*Request metadata invocationId' \
              '\[Bitrise Analytics\].*🤖 Bitrise analytics enabled for tasks.*Invocation ID: [0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'

            source ../_e2e/scripts/extract_invocation_id.sh

            invocation_id=$(extract_invocation_id_gradle "$BITRISE_DEPLOY_DIR/logs.txt")
            if [[ -z "$invocation_id" ]]; then
              fatal "Invocation ID not found in logs"
            fi

            echo "Found Invocation ID: $invocation_id"
            envman add --key INVOCATION_ID --value "$invocation_id"
    - script:
        title: Assert invocation from API
        inputs:
          - content: |-
              source ../_e2e/scripts/assert_invocations.sh
              source ../_e2e/scripts/assert_taskio.sh

              assert_bitrise_invocation_in_list "$INVOCATION_ID" "gradle"
              assert_bitrise_invocation_detail "$INVOCATION_ID" "gradle"
              assert_invocation_tasks_gradle "$INVOCATION_ID"
              assert_build_performance "$BITRISE_APP_SLUG"
              assert_invocation_in_build_performance "$BITRISE_APP_SLUG" "$INVOCATION_ID" "gradle"

              assert_invocation_taskio "$INVOCATION_ID" "gradle"
              assert_invocation_taskio_inputfiles "$INVOCATION_ID" "gradle" "bundle"
    - deploy-to-bitrise-io@2: {}

  update-steps:
    envs:
