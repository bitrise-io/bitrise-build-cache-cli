format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: other
meta:
  bitrise.io:
    machine_type_id: g2.linux.medium
    stack: linux-docker-android-22.04

workflows:
  release:
    description: Creates Linux and Darwin binaries, then publishes a GitHub release
    triggers:
      tag:
      - name:
          regex: '^\d\.\d\.\d$'
    envs:
    - GITHUB_TOKEN: $GIT_BOT_USER_ACCESS_TOKEN
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8:
        inputs:
        - fetch_tags: "yes"
    - script@1:
        title: asdf use latest go
        inputs:
        - content: |-
            #!/usr/bin/env bash

            asdf global golang 1.22
    - script:
        title: Install Goreleaser
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -ex

            GOBIN=/usr/local/bin/ go install github.com/goreleaser/goreleaser/v2@latest
    - bundle::check_gradle_verification_reference: { }
    - script:
        title: Goreleaser (create binaries + publish to GH)
        deps:          
          brew:
          - name: goreleaser
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -ex

            goreleaser release
    - deploy-to-bitrise-io@2: {}
    meta:
      bitrise.io:
        machine_type_id: g2-m1.8core
        stack: osx-xcode-edge
  test:
    triggers:
      push:
      - branch: "main"
      pull_request:
      - source_branch: "*"
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - go-list@1: {}
    - script@1:
        title: golangci-lint
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            make lint
    - go-test@1: {}
    - bundle::check_gradle_verification_reference: { }
    - deploy-to-bitrise-io@2:
        inputs:
          - deploy_path: "$GRADLE_VERIFICATION_REF_TARGET_PATH"
    meta:
      bitrise.io:
        machine_type_id: g2-m1.8core
        stack: osx-xcode-edge
  
  e2e:
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - script@1:
        title: build CLI
        inputs:
        - content: |-
            set -ex
            go build -o bitrise-build-cache-cli
    - script@1:
        title: Run test
        inputs:
        - content: |-
            set -ex
            bitrise run --config e2e/bitrise.yml test_gradle_output_diagnostics

  check_gradle_verification:
    steps:
    - bundle::check_gradle_verification_reference: { }
    
  e2e-cache-gradle:
    envs:
    - TEST_APP_URL: git@github.com:bitrise-io/DuckDuckGo-Android-BuildCache.git
    - BRANCH: develop
    triggers:
      push:
      - branch: "main"
      pull_request:
      - source_branch: "*"
    before_run:
    - e2e-cache-setup
    steps:
    - script:
        title: Enable build cache
        inputs:
        - content: |-
            set -exo pipefail
            ../bitrise-build-cache-cli enable-for gradle -d
    - script:
        title: Build and capture logs
        inputs:
        - content: |-
            set -exo pipefail
            (./gradlew debug 2>&1) | tee logs.txt
    - script:
        title: Check for cache invocations
        inputs:
        - content: |-
            set -exo pipefail
            
            REMOTE_CACHE_ENABLED="$(grep -o '\[Bitrise Build Cache\].*🤖 Bitrise remote cache enabled' -c logs.txt)"
            INVOCATION_IDS="$(grep -o '\[Bitrise Build Cache\].*Request metadata invocationId' -c logs.txt)"

            if [[ $REMOTE_CACHE_ENABLED -ne 1 || $INVOCATION_IDS -ne 1 ]]; then
                echo "Bitrise Build Cache was not set up properly"
                exit 1
            fi
            
  e2e-cache-bazel:
    envs:
    - TEST_APP_URL: git@github.com:bitrise-io/bazel.git
    - BRANCH: master
    triggers:
      push:
      - branch: "main"
      pull_request:
      - source_branch: "*"
    before_run:
    - e2e-cache-setup
    steps:
    - script@1:
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -exo pipefail

            # Download Bazelisk using curl
            # Define the Bazelisk version you want to install
            export BAZELISK_VERSION='1.21.0'

            # Determine the operating system
            OS="$(uname -s)"
            case "$OS" in
                Linux*)     OS_NAME=linux;;
                Darwin*)    OS_NAME=darwin;;
                *)          echo "Unsupported OS: $OS"; exit 1;;
            esac

            # Download Bazelisk using curl based on the operating system
            if [ "$OS_NAME" = "linux" ]; then
                curl -fLO "https://github.com/bazelbuild/bazelisk/releases/download/v${BAZELISK_VERSION}/bazelisk-linux-amd64"
                mv bazelisk-linux-amd64 bazel
            elif [ "$OS_NAME" = "darwin" ]; then
                curl -fLO "https://github.com/bazelbuild/bazelisk/releases/download/v${BAZELISK_VERSION}/bazelisk-darwin-arm64"
                mv bazelisk-darwin-arm64 bazel
            fi

            # Make the binary executable
            chmod +x bazel

            # Move the executable to a directory in your PATH
            sudo mv bazel /usr/local/bin/

            # Verify the installation
            bazel --version
        title: Install bazel
    - script:
        title: Enable build cache
        inputs:
        - content: |-
            set -exo pipefail
            ../bitrise-build-cache-cli enable-for bazel -d
    - script:
        title: Build and capture logs
        inputs:
        - content: |-
            set -exo pipefail
            (/usr/local/bin/bazel build //src:bazel-dev --announce_rc --copt='-w' 2>&1) | tee logs.txt
    - script:
        title: Check for cache invocations
        inputs:
        - content: |-
            set -exo pipefail
            
            REMOTE_CACHE_ENABLED="$(grep -o '--remote_cache=grpcs:\/\/remote-build-cache\.services\.bitrise\.io' -c logs.txt)"
            INVOCATION_IDS="$(grep -o 'Invocation ID: ' -c logs.txt)"
            
            if [[ $REMOTE_CACHE_ENABLED -ne 1 || $INVOCATION_IDS -ne 1 ]]; then
                echo "Bitrise Build Cache was not set up properly"
                exit 1
            fi
            
  e2e-cache-setup:
    steps:
    - activate-ssh-key:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - script:
        title: Delete _tmp dir
        inputs:
        - content: rm -rf _tmp
    - git::https://github.com/bitrise-steplib/bitrise-step-simple-git-clone.git:
        inputs:
        - repository_url: "$TEST_APP_URL"
        - clone_into_dir: "./_tmp"
        - branch: "$BRANCH"
    - git-clone: {}
    - script:
        title: build CLI
        inputs:
        - content: |-
            set -exo pipefail
            go build -o bitrise-build-cache-cli
    - change-workdir:
        title: Switch working dir to _tmp
        inputs:
        - path: "./_tmp"

step_bundles:
  check_gradle_verification_reference:
    steps:
    - script:
        title: Generate Gradle verification reference
        inputs:
        - content: |
            #!/bin/bash
            set -ex

            # Backup $HOME/.gradle/init.d/bitrise-build-cache.init.gradle.kts
            GRADLE_INIT_PATH=$HOME/.gradle/init.d/bitrise-build-cache.init.gradle.kts
            if [[ -f "$GRADLE_INIT_PATH" ]]; then
              mv $GRADLE_INIT_PATH $GRADLE_INIT_PATH.backup
            fi

            go build -o /tmp/bin/bitrise-build-cache-cli

            SAMPLE_PATH=$(realpath ./gradle_verification_sample)
            GRADLE_VERIFICATION_REF_PATH=$SAMPLE_PATH/gradle/verification-metadata.xml
            GRADLE_VERIFICATION_REF_TARGET_PATH=$(realpath ./cmd/asset/verification-metadata.xml)
            
            # add plugin with CLI
            cd "$SAMPLE_PATH"
            /tmp/bin/bitrise-build-cache-cli gradle-verification add-reference-deps

            # generate xml
            rm -f "$SAMPLE_PATH/gradle/verification-metadata.xml"
            ./gradlew --write-verification-metadata sha256 help

            cat $GRADLE_VERIFICATION_REF_PATH
            echo "Generated verification xml: $GRADLE_VERIFICATION_REF_PATH"
            
            # Copy metadata to be included in the CLI binary
            mv -f "$GRADLE_VERIFICATION_REF_PATH" "$GRADLE_VERIFICATION_REF_TARGET_PATH"
            envman add --key GRADLE_VERIFICATION_REF_TARGET_PATH --value "$GRADLE_VERIFICATION_REF_TARGET_PATH"
    - script@1:
        title: Check if local updates to verification-metadata.xml are not commited
        inputs:
        - content: |-
            set -x
            
            git update-index --refresh | grep "cmd/asset/verification-metadata.xml"
            if [[ $? == 0 ]]; then
              echo "Please manually commit the changes to the repo:"
              echo "$GRADLE_VERIFICATION_REF_TARGET_PATH"
              exit 1
            else
              echo "The files have no unstaged changes: $GRADLE_VERIFICATION_REF_TARGET_PATH"
              exit 0
            fi
