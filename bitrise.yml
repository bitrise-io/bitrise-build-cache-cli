step_bundles:
  release-flow-check:
    description: |
      Dry-run of the release flow. Verifies install/installer.sh still works
      against the current GitHub `latest` release and that goreleaser can
      produce a full snapshot build with the current .goreleaser.yaml. Then
      runs `version` on the just-built binary for the host platform.
      Nothing is published. Used by pr-release-check-linux and -mac.
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - script@1:
        title: asdf use latest go
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex

            asdf install golang 1.24.3
            asdf global golang 1.24.3
    - script:
        title: Syntax-check installer.sh (POSIX sh)
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex

            # installer.sh runs under /bin/sh on every Bitrise stack (alpine
            # included). Catch non-POSIX syntax before it ships.
            sh -n install/installer.sh
    - script:
        title: Run installer.sh end-to-end (latest GH release)
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex

            # Exercise the same code path every Bitrise build hits: resolve
            # `latest`, download from GH (with GAR fallback), verify checksum,
            # extract, install. Then smoke-test the resulting binary.
            rm -rf ./bin-installer-check
            sh install/installer.sh -b ./bin-installer-check
            ./bin-installer-check/bitrise-build-cache version
    - script:
        title: Install Goreleaser
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex

            GOBIN=/usr/local/bin/ go install github.com/goreleaser/goreleaser/v2@latest
    - script:
        title: goreleaser check (config validation)
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex

            goreleaser check
    - script:
        title: goreleaser snapshot (dry-run, no publish)
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -ex

            # --snapshot:     no tag required
            # --clean:        wipe ./dist between runs
            # --skip=publish: never touch GitHub / Homebrew / GAR
            goreleaser release --snapshot --clean --skip=publish
            ls -laR dist

            # Smoke-test the just-built binary for the current platform.
            # goreleaser snapshot lays binaries out at:
            #   dist/<project>_<os>_<arch>[_v<variant>]/<binary>
            host_os=$(uname -s | tr '[:upper:]' '[:lower:]')
            host_arch=$(uname -m)
            case "$host_arch" in
              x86_64) host_arch=amd64 ;;
              aarch64) host_arch=arm64 ;;
            esac
            built_binary=$(find dist -type f -name bitrise-build-cache \
              -path "*_${host_os}_${host_arch}*/*" | head -n1)
            if [ -z "$built_binary" ]; then
              echo "Could not locate built binary for ${host_os}/${host_arch} in dist/"
              exit 1
            fi
            echo "Running snapshot binary: $built_binary"
            "$built_binary" version

  generate_gradle_verification_reference:
    steps:
    - script:
        title: Generate Gradle verification reference
        inputs:
        - content: |
            #!/bin/bash
            set -ex

            # Backup $HOME/.gradle/init.d/bitrise-build-cache.init.gradle.kts
            GRADLE_INIT_PATH=$HOME/.gradle/init.d/bitrise-build-cache.init.gradle.kts
            if [[ -f "$GRADLE_INIT_PATH" ]]; then
              mv $GRADLE_INIT_PATH $GRADLE_INIT_PATH.backup
            fi

            go build -o /tmp/bin/bitrise-build-cache-cli

            SAMPLE_PATH=$(realpath ./gradle_verification_sample)
            GRADLE_VERIFICATION_REF_PATH=$SAMPLE_PATH/gradle/verification-metadata.xml
            GRADLE_VERIFICATION_REF_TARGET_PATH=$(realpath ./cmd/gradle/asset/verification-metadata.xml)
            GRADLE_VERIFICATION_REF_MIRROR_TARGET_PATH=$(realpath ./cmd/gradle/asset/verification-metadata-mirror.xml)

            # add plugin with CLI
            cd "$SAMPLE_PATH"
            /tmp/bin/bitrise-build-cache-cli -d gradle-verification add-reference-deps

            # generate xml against the original repos (no mirror)
            rm -f "$SAMPLE_PATH/gradle/verification-metadata.xml"
            ./gradlew --write-verification-metadata sha256 help

            cat $GRADLE_VERIFICATION_REF_PATH
            echo "Generated verification xml: $GRADLE_VERIFICATION_REF_PATH"

            # Copy metadata to be included in the CLI binary
            mv -f "$GRADLE_VERIFICATION_REF_PATH" "$GRADLE_VERIFICATION_REF_TARGET_PATH"
            envman add --key GRADLE_VERIFICATION_REF_TARGET_PATH --value "$GRADLE_VERIFICATION_REF_TARGET_PATH"

            # generate xml against the Bitrise Maven mirror
            export BITRISE_MAVENCENTRAL_PROXY_ENABLED=true
            /tmp/bin/bitrise-build-cache-cli -d activate gradle-mirrors

            rm -f "$SAMPLE_PATH/gradle/verification-metadata.xml"
            ./gradlew --write-verification-metadata sha256 help

            cat $GRADLE_VERIFICATION_REF_PATH
            echo "Generated mirror verification xml: $GRADLE_VERIFICATION_REF_PATH"

            mv -f "$GRADLE_VERIFICATION_REF_PATH" "$GRADLE_VERIFICATION_REF_MIRROR_TARGET_PATH"
            envman add --key GRADLE_VERIFICATION_REF_MIRROR_TARGET_PATH --value "$GRADLE_VERIFICATION_REF_MIRROR_TARGET_PATH"

  check_gradle_verification_reference:
    steps:
    - script@1:
        title: Check if local updates to verification-metadata.xml are not commited
        inputs:
          - content: |-
              set -x

              DIRTY=$(git status --porcelain -- \
                cmd/gradle/asset/verification-metadata.xml \
                cmd/gradle/asset/verification-metadata-mirror.xml)
              if [[ -n "$DIRTY" ]]; then
                echo "Please manually commit the changes to the repo:"
                echo "$DIRTY"
                exit 1
              else
                echo "Verification metadata files have no unstaged changes."
                exit 0
              fi
  generate_and_commit_dependency_matrix:
    steps:
      - script:
          run_if: ".IsCI"
          title: Install pandoc
          inputs:
            - content: |
                #!/bin/bash
                set -ex

                wget https://github.com/jgm/pandoc/releases/download/$PANDOC_VERSION/pandoc-$PANDOC_VERSION-linux-amd64.tar.gz
                tar xvzf pandoc-$PANDOC_VERSION-linux-amd64.tar.gz
                sudo mv pandoc-$PANDOC_VERSION/bin/pandoc /usr/local/bin/

                rm -rf pandoc-$PANDOC_VERSION-linux-amd64.tar.gz
                rm -rf pandoc-$PANDOC_VERSION

                pandoc --version
      - script:
          title: Generate dependency matrix
          inputs:
            - content: |
                #!/bin/bash
                set -ex

                bash ./scripts/generate-dependency-matrix.sh
          envs:
            - GH_TOKEN: $GIT_BOT_USER_ACCESS_TOKEN
      - script:
          title: Reformat dependency matrix
          inputs:
            - content: |
                #!/bin/bash
                set -ex

                pandoc --from=markdown --to=gfm --wrap=auto --output cleaned.md docs/dependency-matrix.md
                mv cleaned.md docs/dependency-matrix.md
      - script:
          title: Commit dependency matrix
          inputs:
            - content: |
                #!/bin/bash
                set -ex

                git status
                ls -l docs/dependency-matrix.md
                git stash push -u -m "stash before switching to gh-pages"

                git fetch --all
                git checkout gh-pages

                rm -f docs/dependency-matrix.md
                git stash apply

                if [ ! -f docs/dependency-matrix.md ]; then
                  echo "No dependency matrix found, skipping commit."
                  exit -1
                fi

                if [ -n "$(git status --porcelain)" ]; then
                  echo "Changes detected, committing and pushing to gh-pages branch."

                  git add docs/dependency-matrix.md
                  git diff --cached docs/dependency-matrix.md

                  git commit -m "chore: update dependency matrix"
                  git push origin gh-pages
                else
                  echo "No changes detected, skipping commit."
                  exit 0
                fi

  feature-e2e-setup:
    steps:
      - activate-ssh-key:
          run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
      - script:
          title: Clone e2e testing repo with deploy key
          run_if: '{{getenv "SSH_DEPLOY_KEY_E2E_TESTING" | ne ""}}'
          inputs:
            - content: |-
                #!/bin/bash
                set -ex

                mkdir -p ~/.ssh
                echo "$SSH_DEPLOY_KEY_E2E_TESTING" > ~/.ssh/github_deploy_build_cache_e2e_testing
                chmod 600 ~/.ssh/github_deploy_build_cache_e2e_testing

                ssh-add ~/.ssh/github_deploy_build_cache_e2e_testing

                mkdir -p ./_e2e
                GIT_SSH_COMMAND='ssh -i ~/.ssh/github_deploy_build_cache_e2e_testing -o IdentitiesOnly=yes' git clone git@github.com:bitrise-io/build-cache-e2e-testing.git ./_e2e

                ls -la ./_e2e
      - script:
          title: Clone e2e repo with existing SSH key
          run_if: '{{getenv "SSH_DEPLOY_KEY_E2E_TESTING" | eq ""}}'
          inputs:
            - content: |-
                #!/bin/bash
                set -ex

                rm -rf ./_e2e
                mkdir -p ./_e2e
                git clone git@github.com:bitrise-io/build-cache-e2e-testing.git ./_e2e

                ls -la ./_e2e
      - script:
          title: Delete _tmp dirs
          inputs:
            - content: rm -rf _tmp
      - script:
          title: Delete DerivedData
          inputs:
            - content: rm -rf ~/Library/Developer/Xcode/DerivedData
      - git::https://github.com/bitrise-steplib/bitrise-step-simple-git-clone.git:
          inputs:
            - repository_url: "$TEST_APP_URL"
            - clone_into_dir: "./_tmp"
            - branch: "$BRANCH"
            - commit: "$COMMIT"
      - git-clone: {}
      - script:
          title: build CLI
          inputs:
            - content: |-
                set -exo pipefail
                go build -o bitrise-build-cache-cli
      - change-workdir:
          title: Switch working dir to _tmp
          inputs:
            - path: "./_tmp"

  config-cache-e2e-activate:
    # Shared prep for the cross-DC configuration-cache e2e workflows.
    # Builds the CLI, clones bitwarden into a STABLE isolated dir (so the
    # project's ancestor-dir listings are deterministic across VMs),
    # activates the build cache, then MOVES the generated init scripts out
    # of the volatile ~/.gradle/init.d/ and exposes them via $GRADLE_INIT_ARGS
    # (--init-script ...) so Gradle doesn't fingerprint them by a relative
    # path through ~/.gradle (the "init script has changed" reuse blocker).
    #
    # GRADLE_ENCRYPTION_KEY is an app-level Bitrise secret (needed so Gradle
    # uses a stable ENV_VAR encryption key, not a random per-VM KEYSTORE key)
    # and flows through automatically.
    envs:
    - APP_DIR: /opt/test-app/bitwarden-android
    - COMMIT: 2c71ab7d27d7f976766adee7bfd1828d5eda0850
    - GRADLE_TASK: debug
    steps:
    - activate-ssh-key:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone: {}
    - script:
        title: Build CLI + record absolute path
        inputs:
        - content: |-
            set -exo pipefail
            go build -o bitrise-build-cache-cli
            envman add --key CLI_BIN --value "$BITRISE_SOURCE_DIR/bitrise-build-cache-cli"
    - script:
        title: Capture BITRISE_DEN_VM_DATACENTER
        inputs:
        - content: |-
            set -exo pipefail
            echo "BITRISE_DEN_VM_DATACENTER=${BITRISE_DEN_VM_DATACENTER:-<unset>}"
    - script:
        title: Clone bitwarden into a stable, isolated dir
        inputs:
        - content: |-
            set -exo pipefail
            # Stable absolute path; ancestor listing is deterministic (holds
            # only this clone) and identical across VMs.
            sudo rm -rf /opt/test-app
            sudo mkdir -p /opt/test-app
            sudo chown -R "$(whoami)" /opt/test-app
            git clone https://github.com/bitwarden/android.git "$APP_DIR"
            git -C "$APP_DIR" checkout "$COMMIT"
    - change-workdir:
        inputs:
        - path: $APP_DIR
    - script:
        title: Enable build cache
        inputs:
        - content: |-
            set -exo pipefail
            "$CLI_BIN" activate gradle -d --cache --cache-push
    - script:
        title: Move init scripts out of ~/.gradle/init.d + pin via --init-script
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -exo pipefail
            # Gradle fingerprints init scripts auto-discovered in
            # ~/.gradle/init.d/ by a relative path through the volatile
            # ~/.gradle dir, marking them "changed" across builds/VMs — the
            # confirmed cross-build config-cache reuse blocker (hits Stripe
            # too, even post-hostname-fix). Move ALL of them to a stable
            # isolated dir and apply explicitly via --init-script so the
            # init.d/ listing is never a configuration input. Save and restore
            # both run this, so both pass the identical --init-script paths.
            sudo mkdir -p /opt/cc-init
            sudo chown -R "$(whoami)" /opt/cc-init
            rm -f /opt/cc-init/*.gradle.kts
            INIT_ARGS=""
            for f in $(find "$HOME/.gradle/init.d" -maxdepth 1 -name '*.gradle.kts' 2>/dev/null | sort); do
              bn=$(basename "$f")
              mv "$f" "/opt/cc-init/$bn"
              INIT_ARGS="$INIT_ARGS --init-script /opt/cc-init/$bn"
            done
            echo "GRADLE_INIT_ARGS=$INIT_ARGS"
            envman add --key GRADLE_INIT_ARGS --value "$INIT_ARGS"
            echo "=== moved init scripts ==="; ls -la /opt/cc-init
            echo "=== remaining ~/.gradle/init.d ==="; ls -la "$HOME/.gradle/init.d" 2>/dev/null || echo "(none)"
    - script:
        title: Pre-warm Android SDK (dry-run, no config cache)
        inputs:
        - content: |-
            set -exo pipefail
            # Trigger SDK auto-install + dependency resolution without storing a
            # config cache, then wipe it so the cached build starts clean.
            ./gradlew $GRADLE_INIT_ARGS $GRADLE_TASK --no-configuration-cache --dry-run --stacktrace 2>&1 | tail -30
            rm -rf .gradle/configuration-cache

  update-step:
    steps:
      - script:
          title: Create PR for step update
          run_if: true
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -ex

                ./scripts/update_step.sh
      - slack@4:
          title: Send slack notification about PR
          run_if: '{{ getenv "SLACK_MESSAGE" | ne "" }}'
          inputs:
            - channel: "#team-advanced-ci-alerts-website"
            - text: "$SLACK_MESSAGE"
            - emoji: "$SLACK_EMOJI"
            - color: "$SLACK_COLOR"
            - webhook_url: "$SLACK_WEBHOOK_ALERTS"

pipelines:
  release-and-verify:
    # Tag-triggered. Runs the `release` workflow (build + publish + GAR
    # mirror), then `verify-release` (end-to-end smoke against the just-
    # published artifacts + GAR fallback). The two workflows are
    # independent builds so verify-release can be re-run on its own
    # without re-cutting the tag.
    workflows:
      release: {}
      verify-release:
        depends_on:
        - release
    triggers:
      tag:
      - name:
          regex: '^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'

  features-e2e:
    workflows:
      test: {}
      pr-release-check-linux: {}
      pr-release-check-mac: {}
      feature-e2e-bazel-bitrisedc-no-rbe: {}
      feature-e2e-bazel-public-no-rbe: {}
      feature-e2e-gradle-duckduck: {}
      feature-e2e-gradle-7: {}
      feature-e2e-gradle-bitwarden: {}

      # Cross-DC configuration-cache reuse: 5 parallel saves blanket the
      # DC pool, then 3 parallel restores per platform exercise the read
      # path. The save fan-out is needed because the accelerate cache is
      # written per-DC and cross-DC replication isn't immediate — a single
      # save would only seed its own DC, and restores landing elsewhere
      # would fall back to the stale slug-only key.
      gradle-configuration-e2e-osx-save:
        parallel: 5
      gradle-configuration-e2e-osx-restore:
        depends_on:
        - gradle-configuration-e2e-osx-save
        parallel: 3
      gradle-configuration-e2e-linux-save:
        parallel: 5
      gradle-configuration-e2e-linux-restore:
        depends_on:
        - gradle-configuration-e2e-linux-save
        parallel: 3
      e2e-xcode-comp-cache: {}
      ccache-storage-helper-test: {}
      react-seek-android-e2e: {}
      react-seek-ios-e2e: {}
      e2e-mavencentral-mirror-duckduck: {}
    triggers:
      pull_request:
        - source_branch: "*"
      push:
        - branch: main
