format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: other
meta:
  bitrise.io:
    stack: linux-docker-android-22.04
    machine_type_id: g2.linux.medium
    # Pin to US region — AMS mirror has been passing through Maven Central 429s
    # (postmortem: https://bitrise.atlassian.net/wiki/spaces/INCIDENT/pages/4980998155).
    machine_region: region-us

app:
  envs:
  - PANDOC_VERSION: "3.6.2"
  - MAVEN_VERSION: "3.9.9"
    # These are needed for the E2E test assertion logic
  - WORKSPACE_SLUG: 322a005426441b60
  - MONOLITH_API_PAT: $BITRISE_BUILD_CACHE_AUTH_TOKEN
  - TRIGGERED_BUILD_SLUG: $BITRISE_BUILD_SLUG

include:
- path: bitrise_rn_config/bitrise.yml

workflows:
  release:
    description: |
      Creates Linux and Darwin binaries, publishes a GitHub release, and
      mirrors artifacts to GAR. NOT triggered directly by a tag; the
      `release-and-verify` pipeline fans this out → `verify-release`.
    envs:
    - GITHUB_TOKEN: $GIT_BOT_USER_ACCESS_TOKEN
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8:
        inputs:
        - fetch_tags: "yes"
    - script@1:
        title: asdf use latest go
        inputs:
        - content: |-
            #!/usr/bin/env bash

            asdf install golang 1.24.3
            asdf global golang 1.24.3
    - script:
        title: Install Goreleaser
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -ex

            GOBIN=/usr/local/bin/ go install github.com/goreleaser/goreleaser/v2@latest
    - bundle::generate_gradle_verification_reference: { }
    - bundle::check_gradle_verification_reference: { }
    - script:
        title: Goreleaser (create binaries + publish to GH)
        deps:
          brew:
          - name: goreleaser
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -ex

            # Homebrew formula generation has been removed from .goreleaser.yaml
            # and moved to a dedicated, non-fatal shell step further down that
            # writes Formula/bitrise-build-cache.rb directly to the tap repo
            # from dist/checksums.txt. This keeps the GH release + GAR mirror
            # (the critical path) free of any brew-related work.
            goreleaser release
    - script:
        title: Authenticate to GCP
        inputs:
          - content: |-
              #!/bin/bash
              set -euxo pipefail
              KEY_FILE_PATH=$(mktemp -d)/keyfile.json
              echo "${GAR_SERVICE_ACCOUNT_B64}" | base64 --decode > ${KEY_FILE_PATH}
              gcloud auth activate-service-account --key-file=${KEY_FILE_PATH}
    - script:
        title: Upload release artifacts to GAR
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            ./scripts/gar_upload_release_artifacts.sh
    - script:
        title: Mirror ccache binaries to GAR
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            ./scripts/gar_mirror_ccache.sh
    - script:
        title: Mirror install/installer.sh to GAR
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            ./scripts/gar_mirror_installer.sh
    - deploy-to-bitrise-io@2:
        is_always_run: true
        inputs:
          - deploy_path: "$GRADLE_VERIFICATION_REF_TARGET_PATH"
    - deploy-to-bitrise-io@2:
        is_always_run: true
        inputs:
          - deploy_path: "$GRADLE_VERIFICATION_REF_MIRROR_TARGET_PATH"
    - script:
        title: Publish Homebrew formula (non-fatal)
        is_skippable: true
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -e
            ./scripts/publish_homebrew_formula.sh
    - bundle::update-step:
        envs:
        - STEP_NAME: bitrise-step-activate-gradle-remote-cache
        - UPDATE_SCRIPT_PATH: ../scripts/update_activate_gradle_remote_cache.sh
    - bundle::update-step:
        envs:
        - STEP_NAME: bitrise-step-activate-gradle-features
        - UPDATE_SCRIPT_PATH: ../scripts/update_activate_gradle_features.sh
    - bundle::update-step:
        envs:
        - STEP_NAME: bitrise-step-activate-build-cache-for-xcode
        - UPDATE_SCRIPT_PATH: ../scripts/update_activate_build_cache_for_xcode.sh
    - bundle::update-step:
        envs:
        - STEP_NAME: bitrise-step-activate-react-native-features
        - UPDATE_SCRIPT_PATH: ../scripts/update_activate_react_native_features.sh
    - slack@4:
        inputs:
          - channel: "#team-advanced-ci-alerts-website"
          - text: |-
              CLI release failed! :gopher_lift: :rotating_light:

              Check build here: $BITRISE_BUILD_URL
          - emoji: ":rotating_light:"
          - color: "#ee003b"
          - webhook_url: "$SLACK_WEBHOOK_ALERTS"
        title: Send slack if failed
        run_if: ".IsBuildFailed"
    meta:
      bitrise.io:
        machine_type_id: g2.mac.medium
        stack: osx-xcode-edge

  verify-release:
    description: |
      End-to-end verification of the install pipeline against the
      just-published artifacts. Runs scripts/verify_release.sh which:
        1. installs via raw.githubusercontent.com, asserts version == tag
        2. diffs the GAR-mirrored installer.sh (pinned + latest-pointer)
           against the in-tree copy + asserts latest-pointer:VERSION == tag
        3. temporarily blocks github.com via /etc/hosts and re-runs
           installer.sh — forces both tag resolution AND binary download
           through GAR. /etc/hosts is restored via `trap` on exit.
      Pinned to macOS: fresh VM per build, so /etc/hosts mutations are
      contained. Posts to Slack on failure. Retry-safe (independent of
      the release workflow).
    meta:
      bitrise.io:
        machine_type_id: g2.mac.medium
        stack: osx-xcode-edge
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8:
        inputs:
        - fetch_tags: "yes"
    - script:
        title: Verify release end-to-end (GH + GAR install paths)
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -e
            ./scripts/verify_release.sh
    - slack@4:
        inputs:
          - channel: "#team-advanced-ci-alerts-website"
          - text: |-
              CLI release verification FAILED for $BITRISE_GIT_TAG! :rotating_light:

              The release artifacts may be broken or unreachable via GAR.
              Check build: $BITRISE_BUILD_URL

              The release workflow itself succeeded — retry this workflow once the issue is fixed (no need to re-cut the tag).
          - emoji: ":rotating_light:"
          - color: "#ee003b"
          - webhook_url: "$SLACK_WEBHOOK_ALERTS"
        title: Send slack if failed
        run_if: ".IsBuildFailed"

  test:
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - go-list@1: {}
    - script@1:
        title: golangci-lint
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            make lint
    - go-test@1: {}
    - bundle::generate_gradle_verification_reference: { }
    - bundle::check_gradle_verification_reference: { }
    - deploy-to-bitrise-io@2:
        inputs:
          - deploy_path: "$GRADLE_VERIFICATION_REF_TARGET_PATH"
    - deploy-to-bitrise-io@2:
        inputs:
          - deploy_path: "$GRADLE_VERIFICATION_REF_MIRROR_TARGET_PATH"
    meta:
      bitrise.io:
        machine_type_id: g2.mac.medium
        stack: osx-xcode-edge

  pr-release-check-linux:
    description: |
      PR dry-run of the release flow on Linux. See bundle::release-flow-check.
    meta:
      bitrise.io:
        machine_type_id: g2.linux.medium
        stack: linux-docker-android-22.04
    steps:
    - bundle::release-flow-check: {}

  pr-release-check-mac:
    description: |
      PR dry-run of the release flow on macOS. See bundle::release-flow-check.
    meta:
      bitrise.io:
        machine_type_id: g2.mac.medium
        stack: osx-xcode-edge
    steps:
    - bundle::release-flow-check: {}

  generate_gradle_verification:
    steps:
    - bundle::generate_gradle_verification_reference: { }

  generate_and_commit_dependency_matrix:
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8:
        inputs:
          - fetch_tags: "yes"
          - shallow_clone: "false"
          - clone_depth: "-1"
    - bundle::generate_and_commit_dependency_matrix: {}
    - slack@4:
        inputs:
          - channel: "#team-advanced-ci-alerts-website"
          - text: |-
              Dependency matrix generation failed! :matrix-code: :rotating_light:

              Check build here: $BITRISE_BUILD_URL
          - emoji: ":rotating_light:"
          - color: "#ee003b"
          - webhook_url: "$SLACK_WEBHOOK_ALERTS"
        title: Send slack if failed
        run_if: ".IsBuildFailed"

  update_plugins:
    envs:
      - GITHUB_TOKEN: $GIT_BOT_USER_ACCESS_TOKEN
    steps:
      - activate-ssh-key@4:
            run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
      - git-clone@8:
          inputs:
          - fetch_tags: "yes"
          - shallow_clone: "false"
          - clone_depth: "-1"
      - script@1:
          title: Change apt sources to enzu mirror
          inputs:
            - content: |-
                #!/usr/bin/env bash

                sed -i.bak 's|http://archive.ubuntu.com/ubuntu/|https://mirror.enzu.com/ubuntu/|g' /etc/apt/sources.list
      - apt-get-install:
          inputs:
            - packages: libxml2-utils
      - script:
          title: Ensure we're on main
          inputs:
            - content: |
                #!/bin/bash
                set -ex

                git fetch origin
                if [[ "$BITRISE_GIT_BRANCH" != "main" ]]; then
                  git checkout main
                  git pull origin main
                fi
      - script:
          title: Update plugins with latest version
          inputs:
            - content: |
                bash ./scripts/update_plugins.sh
      - bundle::generate_gradle_verification_reference: {}
      - script:
          title: Commit updated plugins and open PR
          inputs:
            - content: |
                set -ex

                # Check for existing PR with the same title
                existing_pr=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                  "https://api.github.com/repos/bitrise-io/bitrise-build-cache-cli/pulls?state=open" | jq -r ".[] | select(.title == \"chore: Update Gradle plugins\") | .html_url")

                if [ -n "$existing_pr" ]; then
                  echo "A pull request with this title already exists: $existing_pr"
                  exit 0
                fi

                if [ -n "$(git status --porcelain)" ]; then
                  git branch -D update-plugins || true
                  git checkout -b update-plugins

                  git add .
                  git commit -m "feat: update plugins to release"
                  git push -f origin update-plugins

                  # Create a pull request using GitHub API
                  pr_response=$(curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
                    -d "{\"title\":\"chore: Update Gradle plugins\",\"body\":\"This PR updates the Gradle plugins.\",\"head\":\"update-plugins\",\"base\":\"main\"}" \
                    "https://api.github.com/repos/bitrise-io/bitrise-build-cache-cli/pulls")

                    pr_url=$(echo "$pr_response" | jq -r .html_url)
                    envman add --key PR_URL --value "$pr_url"

                    if [ "$pr_url" != "null" ]; then
                      echo "Pull request created successfully: $pr_url"
                    else
                      echo "Failed to create pull request. Response: $pr_response"
                      exit 1
                    fi
                else
                  echo "No changes detected, skipping commit."
                  exit 0
                fi
      - slack@4:
          inputs:
            - channel: "#team-advanced-ci-alerts-website"
            - text: |-
                Gradle plugin update PR is ready! :tada: :rocket: :gradle:

                Check PR here: $PR_URL
            - emoji: ":gradle:"
            - color: "#08a045"
            - webhook_url: "$SLACK_WEBHOOK_ALERTS"
          title: Send slack if PR opened
          run_if: '{{ getenv "PR_URL" | ne "" }}'
      - slack@4:
          inputs:
            - channel: "#team-advanced-ci-alerts-website"
            - text: |-
                CLI plugin update failed! :gradle: :gopher_lift: :rotating_light:

                Check build here: $BITRISE_BUILD_URL
            - emoji: ":rotating_light:"
            - color: "#ee003b"
            - webhook_url: "$SLACK_WEBHOOK_ALERTS"
          title: Send slack if failed
          run_if: ".IsBuildFailed"

  feature-e2e-gradle-duckduck:
    envs:
    - TEST_APP_URL: git@github.com:duckduckgo/Android.git
    - BRANCH: develop
    steps:
    - bundle::feature-e2e-setup: {}
    - script@1:
        title: Change apt sources to enzu mirror
        inputs:
          - content: |-
              #!/usr/bin/env bash

              sed -i.bak 's|http://archive.ubuntu.com/ubuntu/|https://mirror.enzu.com/ubuntu/|g' /etc/apt/sources.list
    - apt-get-install:
        inputs:
          - packages: 'bc'
          - upgrade: "no"
    - set-java-version@1:
        inputs:
          - set_java_version: '21'
    - restore-gradle-cache:
        inputs:
          - verbose: 'true'
    - script:
        title: Enable build cache
        inputs:
        - content: |-
            set -exo pipefail
            ../bitrise-build-cache-cli activate gradle -d --cache --cache-push
    - script:
        title: Print ~/.init.d/bitrise-build-cache.init.gradle.kts
        inputs:
          - content: |-
              cat ~/.gradle/init.d/bitrise-build-cache.init.gradle.kts
    - script:
        title: Build and capture logs
        inputs:
        - content: |-
            set -exo pipefail
            (./gradlew debug --stacktrace 2>&1) | tee "$BITRISE_DEPLOY_DIR/logs.txt"
    - script:
        title: Check for cache invocations
        inputs:
        - content: |-
            set -exo pipefail

            ../scripts/check_pattern.sh "$BITRISE_DEPLOY_DIR/logs.txt" \
              '\[Bitrise Build Cache\].*🤖 Bitrise remote cache enabled' \
              '\[Bitrise Build Cache\].*Request metadata invocationId' \
              '\[Bitrise Analytics\].*🤖 Bitrise analytics enabled for tasks.*Invocation ID: [0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'

            source ../_e2e/scripts/extract_invocation_id.sh

            invocation_id=$(extract_invocation_id_gradle "$BITRISE_DEPLOY_DIR/logs.txt")
            if [[ -z "$invocation_id" ]]; then
              fatal "Invocation ID not found in logs"
            fi

            echo "Found Invocation ID: $invocation_id"
            envman add --key INVOCATION_ID --value "$invocation_id"
    - script:
        title: Assert invocation from API
        inputs:
          - content: |-
              source ../_e2e/scripts/assert_invocations.sh
              source ../_e2e/scripts/assert_taskio.sh

              assert_bitrise_invocation_in_list "$INVOCATION_ID" "gradle"
              assert_bitrise_invocation_detail "$INVOCATION_ID" "gradle"
              assert_invocation_tasks_gradle "$INVOCATION_ID"
              assert_build_performance "$BITRISE_APP_SLUG"
              assert_invocation_in_build_performance "$BITRISE_APP_SLUG" "$INVOCATION_ID" "gradle"

              assert_invocation_taskio "$INVOCATION_ID" "gradle"
              assert_invocation_taskio_inputfiles "$INVOCATION_ID" "gradle" "bundle"
    - save-gradle-cache:
        inputs:
          - verbose: 'true'
    - deploy-to-bitrise-io@2: {}

  feature-e2e-gradle-7:
    envs:
      - TEST_APP_URL: https://github.com/bitrise-io/Bitrise-Android-Sample
      - BRANCH: main
    steps:
      - bundle::feature-e2e-setup: { }
      - script@1:
